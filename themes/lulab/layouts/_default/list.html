{{ define "main" }}
<article class="page-body">
  <div class="page-inner">
    <h1 class="page-title">{{ .Title | upper }}</h1>
    <div class="prose">
      {{ .Content }}
    </div>
    {{ with .Pages }}
    <div class="post-list">
      {{ range . }}
      <article class="post-item">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Date }}<time>{{ .Format "January 2, 2006" }}</time>{{ end }}
        <div class="prose">{{ .Summary }}</div>
      </article>
      {{ end }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
